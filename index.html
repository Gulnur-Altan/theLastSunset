<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>The Last Sunset</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div id="menu">
        <h1>The Last Sunset</h1>
        <p>Collect humanity’s lost knowledge before the sun disappears forever.</p>
        <button id="startBtn">Start</button>
    </div>

    <div id="ui">
        <div id="day">Day 1</div>
        <div id="archives">Archives: 0</div>
    </div>

    <div id="terminal"></div>
    <div id="vignette"></div>

    <div id="gameover">
        <h1>THE LAST SUNSET</h1>
        <p id="finalText"></p>
        <button id="restartBtn">Restart</button>
    </div>

    <canvas id="game"></canvas>

</body>

</html>
